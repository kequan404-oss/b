<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北鼻</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #fff5f8;
            color: #333;
            line-height: 1.8;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #e84393;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px #ffc0cb;
        }

        h2 {
            color: #d63384;
            font-size: 1.4rem;
            margin: 25px 0 15px;
            padding-left: 10px;
            border-left: 4px solid #ff87b2;
        }

        p {
            font-size: 1rem;
            margin: 8px 0;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, #ff9ac1, transparent);
            margin: 30px 0;
        }

        .product-wrap {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .product-item {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(232, 67, 147, 0.18);
            padding: 15px;
            transition: 0.3s ease;
            text-align: center;
            cursor: pointer;
        }

        .product-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 5px 12px rgba(232, 67, 147, 0.25);
        }

        .product-thumb {
            width: 100%;
            height: 0;
            padding-bottom: 100%;
            position: relative;
            background-color: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .product-thumb img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-name {
            font-size: 16px;
            font-weight: 500;
        }

        .contact-box {
            background: #ffffff;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

    <hr>
    <h2>工厂信息</h2>
