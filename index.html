<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北鼻</title>
    <style>
        /* 全局样式重置与基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #fff5f8;
            color: #333;
            line-height: 1.8;
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* 大标题样式 */
        h1 {
            color: #e84393;
            text-align: center;
            font-size: 2.4rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px #ffc0cb;
        }

        /* 二级标题 */
        h2 {
            color: #d63384;
            font-size: 1.6rem;
            margin: 30px 0 15px;
            padding-left: 10px;
            border-left: 4px solid #ff87b2;
        }

        /* 段落文本 */
        p {
            font-size: 1.05rem;
            margin: 10px 0;
            padding: 0 10px;
        }

        /* 分割线美化 */
        hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, #ff9ac1, transparent);
            margin: 35px 0;
        }

        /* 列表样式 */
        ul {
            list-style: none;
            padding: 0 20px;
        }

        li {
            background: #ffffff;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 4px rgba(232, 67, 147, 0.15);
            transition: 0.3s ease;
        }

        li:hover {
            transform: translateX(5px);
            background: #ffeaf2;
        }

        /* 联系信息区块 */
        .contact-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <h1>老婆，看我做的网站帅不帅</h1>
    <p>这是纯免费版的，所以网址有点奇怪。</p>

    <hr>

    <h2>爱你</h2>
    <p>付费之后网址将会变成正经网址，比如：loveyoubaby.com</p>

    <hr>

    <h2>产品信息</h2>
    <ul>
        <li>婴儿车</li>
        <li>双胞胎车</li>
        <li>四胞胎车</li>
        <li>手推车</li>
        <li>四合一车</li>
    </ul>

    <hr>

    <h2>工厂信息</h2>
    <p>中国</p>
    <p>广东</p>
    <p>佛山</p>

    <hr>

    <h2>联系我</h2>
    <div class="contact-box">
        <p>Email: sales@qq.com</p>
        <p>WhatsApp: +8615918899787</p>
    </div>
</body>
</html>
