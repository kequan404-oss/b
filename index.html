<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北鼻</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #fff5f8;
            color: #333;
            line-height: 1.8;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #e84393;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px #ffc0cb;
        }

        h2 {
            color: #d63384;
            font-size: 1.4rem;
            margin: 25px 0 15px;
            padding-left: 10px;
            border-left: 4px solid #ff87b2;
        }

        p {
            font-size: 1rem;
            margin: 8px 0;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, #ff9ac1, transparent);
            margin: 30px 0;
        }

        /* 产品网格：每行3列 */
        .product-wrap {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        /* 商品卡片 */
        .product-item {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(232, 67, 147, 0.18);
            padding: 15px;
            transition: 0.3s ease;
            text-align: center;
        }

        .product-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 5px 12px rgba(232, 67, 147, 0.25);
        }

        /* 缩略图容器 */
        .product-thumb {
            width: 100%;
            height: 220px;
            background-color: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            margin-bottom: 12px;
            overflow: hidden; /* 裁剪溢出部分 */
        }

        /* 图片自适应样式 */
        .product-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保持比例，自动裁剪适配容器 */
        }

        .product-name {
            font-size: 16px;
            font-weight: 500;
        }

        .contact-box {
            background: #ffffff;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <h1>老婆，看我做的网站帅不帅</h1>
    <p>这是纯免费版的，所以网址有点奇怪。</p>

    <hr>

    <h2>爱你</h2>
    <p>付费之后网址将会变成正经网址，比如：loveyoubaby.com</p>

    <hr>

    <h2>产品信息</h2>
    <div class="product-wrap">
        <!-- 第一行 3个 -->
        <div class="product-item">
            <div class="product-thumb">
                <!-- 把 src 替换成你的图片链接 -->
                <img src="https://raw.githubusercontent.com/kequan404-oss/tupian/refs/heads/main/%E4%B8%BB%E5%9B%BE-04.jpg" alt="婴儿车">
            </div>
            <div class="product-name">婴儿车</div>
        </div>
        <div class="product-item">
            <div class="product-thumb">
                <img src="你https://github.com/kequan404-oss/tupian/blob/main/%E8%AF%A6%E6%83%85-06.jpg?raw=true" alt="双胞胎车">
            </div>
            <div class="product-name">双胞胎车</div>
        </div>
        <div class="product-item">
            <div class="product-thumb">
                <img src="你的图片链接3" alt="四胞胎车">
            </div>
            <div class="product-name">四胞胎车</div>
        </div>

        <!-- 第二行 3个 -->
        <div class="product-item">
            <div class="product-thumb">
                <img src="你的图片链接4" alt="手推车">
            </div>
            <div class="product-name">手推车</div>
        </div>
        <div class="product-item">
            <div class="product-thumb">
                <img src="你的图片链接5" alt="四合一车">
            </div>
            <div class="product-name">四合一车</div>
        </div>
        <div class="product-item">
            <div class="product-thumb">
                <img src="你的图片链接6" alt="待添加商品">
            </div>
            <div class="product-name">待添加商品</div>
        </div>
    </div>

    <hr>

    <h2>工厂信息</h2>
    <p>中国</p>
    <p>广东</p>
    <p>佛山</p>

    <hr>

    <h2>Contact Us</h2>
    <div class="contact-box">
        <p>Email: sales@yourcompany.com</p>
        <p>WhatsApp: +8615918899787</p>
    </div>
</body>
</html>
